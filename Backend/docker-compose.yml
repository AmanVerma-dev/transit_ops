services:
  db:
    image: postgres:15-alpine
    container_name: transitops_db
    restart: always
    environment:
      POSTGRES_DB: transitops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: transitops_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/transitops
      - JWT_SECRET_KEY=supersecretjwtkeythatshouldbechangedinproduction123!
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      - db

volumes:
  postgres_data:
